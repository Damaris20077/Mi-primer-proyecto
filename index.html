<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aplicación con GPS y Cámara</title>

<style>
body{
    background-color:#cfefff;
    font-family:Arial;
    text-align:center;
    padding:40px;
}

h1{
    color:#333;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}

#video{
    margin-top:20px;
    border:3px solid #333;
}
</style>
</head>

<body>

<h1>Aplicación usando Hardware del Dispositivo</h1>

<h2>Ubicación GPS</h2>

<button onclick="obtenerUbicacion()">Obtener mi ubicación</button>

<p id="ubicacion"></p>


<h2>Cámara del dispositivo</h2>

<button onclick="abrirCamara()">Abrir cámara</button>

<br><br>

<video id="video" width="400" autoplay></video>


<script>

function obtenerUbicacion() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(posicion) {

            document.getElementById("ubicacion").innerHTML =
            "Latitud: " + posicion.coords.latitude +
            "<br>Longitud: " + posicion.coords.longitude;

        });

    } else {

        document.getElementById("ubicacion").innerHTML = "GPS no disponible";

    }

}


function abrirCamara() {

navigator.mediaDevices.getUserMedia({ video: true })

.then(function(stream){

document.getElementById("video").srcObject = stream;

})

.catch(function(error){

console.log("Error al acceder a la cámara:", error);

});

}

</script>

</body>
</html>
